# ─────────────────────────────────────────────────────────────
#  deployment/service.yaml
#  Expose techno-ml-app via AWS Load Balancer (port 80 → 2000)
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: techno-ml-service
  namespace: default
  annotations:
    # Provision an AWS Classic / ALB Load Balancer automatically
    service.beta.kubernetes.io/aws-load-balancer-type: "classic"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
  labels:
    app: techno-ml-app
spec:
  type: LoadBalancer          # EKS will create an AWS ELB automatically
  selector:
    app: techno-ml-app
  ports:
    - name: http
      protocol: TCP
      port: 80                # External port (Security Group techno-sg-lb allows 80)
      targetPort: 2000        # Container port (techno-sg-apps allows 2000)
